name: buildtex

on:
  push:
    branches: main
    paths: [docs/**]
  pull_request:
    branches: main
    paths: [docs/**]

permissions:
  contents: write

jobs:
  compile-latex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get changed LaTeX files
        id: latex-files
        run: |
          CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- docs/**/*.tex | xargs)
          echo "Changed files: $CHANGED_FILES"
          echo "CHANGED_FILES=$CHANGED_FILES" >> $GITHUB_ENV
          CHANGED_FILENAMES=$(for file in $CHANGED_FILES; do basename "$file"; done | xargs)
          echo "CHANGED_FILENAMES=$CHANGED_FILENAMES" >> $GITHUB_ENV
          FILE_COUNT=$(echo $CHANGED_FILENAMES | wc -w)
          if [ $FILE_COUNT -gt 1 ]; then
            PLURAL_S='s'
          else
            PLURAL_S=''
          fi
          echo "PLURAL_S=$PLURAL_S" >> $GITHUB_ENV
      - uses: xu-cheng/texlive-action@v2
        name: Compile LaTeX Files
        with:
          scheme: full
          texlive_version: 2024
          run: |
            apk add make
            cd docs
            TO_BUILD=""
            for file in ${{ env.CHANGED_FILES }}; do
              [ -z "$file" ] && continue
              case "$(basename "$file")" in
                Comments.tex|Common.tex|Reflection.tex) continue ;;
              esac
              TO_BUILD="$TO_BUILD $file"
            done
            TO_BUILD=$(echo $TO_BUILD | xargs)
            if [ -n "$TO_BUILD" ]; then
              for file in $TO_BUILD; do
                dir=$(dirname "$file" | cut -d'/' -f2-)
                make -B "$dir/$(basename "$file" .tex).pdf"
              done
            elif printf '%s\n' ${{ env.CHANGED_FILES }} | grep -qE '(Comments|Common|Reflection)\.tex$'; then
              echo "Only shared fragment(s) changed; rebuilding all standalone PDFs."
              make all
            else
              echo "No LaTeX sources to compile."
            fi
      - name: Handle existing PDF changes
        run: |
          # Stash any existing uncommitted changes to PDF files (any depth under docs/)
          mapfile -t PDFS < <(find docs -name '*.pdf' 2>/dev/null || true)
          if [ ${#PDFS[@]} -gt 0 ]; then
            git stash push -m "Temporary stash of existing PDF changes" -- "${PDFS[@]}" || true
          fi
          # Switch to main branch and pull latest changes
          git checkout main
          git pull origin main
      - name: Commit and push PDFs
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 'Add/Update PDF${{ env.PLURAL_S }} for changed LaTeX file${{ env.PLURAL_S }}: ${{ env.CHANGED_FILENAMES }}'
          file_pattern: 'docs/**/*.pdf'
          branch: main
