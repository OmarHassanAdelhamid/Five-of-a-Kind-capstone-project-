<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoVox — Setup</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        font-size: 13px;
        line-height: 1.45;
        padding: 20px 22px;
        min-height: 100vh;
        -webkit-app-region: drag;
      }
      button,
      input {
        -webkit-app-region: no-drag;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .sub {
        color: #94a3b8;
        margin-bottom: 16px;
        font-size: 12px;
      }
      .python-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 12px;
        background: rgba(30, 41, 59, 0.8);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 8px;
        margin-bottom: 12px;
      }
      .flag {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-top: 4px;
        flex-shrink: 0;
      }
      .flag.ok {
        background: #22c55e;
        box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      }
      .flag.bad {
        background: #ef4444;
        box-shadow: 0 0 8px rgba(239, 68, 68, 0.4);
      }
      .flag.wait {
        background: #eab308;
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        50% {
          opacity: 0.5;
        }
      }
      .python-meta {
        flex: 1;
        min-width: 0;
      }
      .python-meta strong {
        display: block;
        margin-bottom: 4px;
      }
      .python-path {
        font-size: 11px;
        color: #94a3b8;
        word-break: break-all;
        font-family: ui-monospace, monospace;
      }
      .python-fix {
        display: none;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid rgba(148, 163, 184, 0.15);
      }
      .python-fix.visible {
        display: block;
      }
      .python-fix label {
        display: block;
        margin-bottom: 6px;
        color: #cbd5e1;
        font-size: 12px;
      }
      .path-input-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }
      input[type='text'] {
        flex: 1;
        padding: 8px 10px;
        border-radius: 6px;
        border: 1px solid rgba(148, 163, 184, 0.3);
        background: #0b1220;
        color: #e2e8f0;
        font-size: 12px;
        font-family: ui-monospace, monospace;
      }
      button {
        padding: 8px 14px;
        border-radius: 6px;
        border: none;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        background: #38bdf8;
        color: #0f172a;
      }
      button:hover {
        filter: brightness(1.08);
      }
      button.secondary {
        background: rgba(148, 163, 184, 0.25);
        color: #e2e8f0;
      }
      button.danger {
        background: rgba(239, 68, 68, 0.25);
        color: #fecaca;
      }
      .phase {
        margin: 14px 0 6px;
        color: #cbd5e1;
        font-size: 12px;
      }
      .bar-wrap {
        height: 8px;
        background: rgba(30, 41, 59, 0.9);
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.15);
      }
      .bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #0ea5e9, #38bdf8);
        border-radius: 4px;
        transition: width 0.25s ease-out;
      }
      .package-line {
        margin-top: 8px;
        font-size: 11px;
        color: #7dd3fc;
        min-height: 1.2em;
        word-break: break-word;
      }
      .log {
        margin-top: 12px;
        height: 120px;
        overflow-y: auto;
        padding: 8px 10px;
        background: #020617;
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 6px;
        font-family: ui-monospace, monospace;
        font-size: 10px;
        color: #94a3b8;
        white-space: pre-wrap;
        word-break: break-all;
      }
      .pkg-hint {
        font-size: 11px;
        color: #64748b;
        margin-bottom: 8px;
        max-height: 2.6em;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <h1>AutoVox</h1>
    <p class="sub">Setting up the Python environment (first launch)</p>

    <div class="python-row">
      <div class="flag wait" id="py-flag" aria-hidden="true"></div>
      <div class="python-meta">
        <strong id="py-title">Checking Python…</strong>
        <div class="python-path" id="py-detail"></div>
        <div class="python-fix" id="py-fix">
          <label for="py-input">Python 3 executable (3.9+). Leave blank and click “Use this Python” to clear a saved path and auto-detect again.</label>
          <div class="path-input-row">
            <input type="text" id="py-input" placeholder="/opt/homebrew/bin/python3" spellcheck="false" />
            <button type="button" class="secondary" id="py-browse">Browse…</button>
          </div>
          <button type="button" id="py-try">Use this Python</button>
          <button type="button" class="danger" id="py-cancel" style="margin-left: 8px">Cancel</button>
        </div>
      </div>
    </div>

    <div class="pkg-hint" id="pkg-hint"></div>
    <div class="phase" id="phase-label">Preparing…</div>
    <div class="bar-wrap">
      <div class="bar-fill" id="bar"></div>
    </div>
    <div class="package-line" id="current-pkg"></div>
    <div class="log" id="log"></div>

    <script>
      const bar = document.getElementById('bar')
      const phaseEl = document.getElementById('phase-label')
      const logEl = document.getElementById('log')
      const pkgLine = document.getElementById('current-pkg')
      const pkgHint = document.getElementById('pkg-hint')
      const pyFlag = document.getElementById('py-flag')
      const pyTitle = document.getElementById('py-title')
      const pyDetail = document.getElementById('py-detail')
      const pyFix = document.getElementById('py-fix')
      const pyInput = document.getElementById('py-input')
      const pyBrowse = document.getElementById('py-browse')
      const pyTry = document.getElementById('py-try')
      const pyCancel = document.getElementById('py-cancel')

      let logBuf = ''
      const maxLog = 8000

      function appendLog(chunk) {
        logBuf += chunk
        if (logBuf.length > maxLog) logBuf = logBuf.slice(-maxLog)
        logEl.textContent = logBuf
        logEl.scrollTop = logEl.scrollHeight
      }

      function setProgress(p) {
        bar.style.width = Math.min(100, Math.max(0, p)) + '%'
      }

      window.setupApi.onUpdate((data) => {
        if (data.progress != null) setProgress(data.progress)
        if (data.phase) phaseEl.textContent = data.phase
        if (data.logChunk) appendLog(data.logChunk)
        if (data.currentPackage !== undefined) {
          pkgLine.textContent = data.currentPackage
        }
        if (data.packageListPreview) pkgHint.textContent = data.packageListPreview

        if (data.pythonProbe) {
          const pr = data.pythonProbe
          pyFlag.classList.remove('wait', 'ok', 'bad')
          if (pr.checking) {
            pyFlag.classList.add('wait')
            pyTitle.textContent = 'Looking for Python 3…'
            pyDetail.textContent = pr.triedPath || ''
            pyFix.classList.remove('visible')
          } else if (pr.ok) {
            pyFlag.classList.add('ok')
            pyTitle.textContent = 'Python found'
            pyDetail.textContent = (pr.versionLine || '') + '\n' + (pr.resolvedPath || pr.triedPath || '')
            pyFix.classList.remove('visible')
          } else {
            pyFlag.classList.add('bad')
            pyTitle.textContent = 'Python not found or not usable'
            pyDetail.textContent = pr.error || 'Could not run python3.'
            pyFix.classList.add('visible')
            if (data.suggestedPath) pyInput.value = data.suggestedPath
          }
        }
      })

      pyBrowse.addEventListener('click', async () => {
        const p = await window.setupApi.browsePython()
        if (p) pyInput.value = p
      })

      pyTry.addEventListener('click', () => {
        window.setupApi.continuePython(pyInput.value.trim())
      })

      pyCancel.addEventListener('click', () => {
        window.setupApi.cancelSetup()
      })
    </script>
  </body>
</html>
