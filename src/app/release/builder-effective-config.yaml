directories:
  output: release
  buildResources: build
appId: com.autovox.desktop
productName: Autovox
icon: build/icon.png
extraResources:
  - from: ../frontend/dist
    to: frontend
  - from: ../backend
    to: backend
    filter:
      - '**/*'
      - '!**/__pycache__/**'
      - '!**/.pytest_cache/**'
      - '!**/.coverage'
      - '!**/htmlcov/**'
      - '!**/tests/**'
      - '!**/*.pyc'
      - '!**/dist/**'
      - '!**/build/**'
      - '!**/.venv/**'
      - '!**/.venv-build/**'
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
win:
  target:
    - nsis
    - zip
linux:
  target:
    - AppImage
    - deb
  category: Development
files: []
electronVersion: 33.4.11
